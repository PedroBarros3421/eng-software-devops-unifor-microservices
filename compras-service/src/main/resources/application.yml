server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: compras-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/compras_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:mypostgres123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    preferIpAddress: true

logging:
  include-application-name: false
  pattern:
    correlation: "[${spring.application.name:compras-service},%X{correlationId:-},%X{traceId:-},%X{spanId:-}] "

management:
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${JAEGER_URL:http://localhost:4318/v1/traces}
