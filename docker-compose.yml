services:

  # ── Bancos de Dados ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - ms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Infraestrutura ───────────────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686" # Jaeger UI
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"   # OTLP gRPC receiver
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"   # OTLP HTTP receiver
    networks:
      - ms-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - ms-network

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    command: [ "-config.file=/etc/loki/local-config.yaml" ]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    networks:
      - ms-network

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    command: [ "-config.file=/etc/promtail/config.yml" ]
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - ms-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - ms-network

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "${EUREKA_PORT:-8761}:8761"
    environment:
      EUREKA_HOSTNAME: ${EUREKA_HOSTNAME:-eureka-server}
      JAEGER_URL: ${JAEGER_URL:-http://jaeger:4318/v1/traces}
    networks:
      - ms-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      EUREKA_URL: ${EUREKA_URL:-http://eureka-server:8761/eureka/}
      JAEGER_URL: ${JAEGER_URL:-http://jaeger:4318/v1/traces}
    networks:
      - ms-network
    depends_on:
      eureka-server:
        condition: service_healthy

  # ── Microsserviços de Negócio ────────────────────────────────────────────────

  compras-service:
    build: ./compras-service
    container_name: compras-service
    ports:
      - "${COMPRAS_PORT:-8081}:8081"
    environment:
      EUREKA_URL: ${EUREKA_URL:-http://eureka-server:8761/eureka/}
      JAEGER_URL: ${JAEGER_URL:-http://jaeger:4318/v1/traces}
      DB_URL: ${COMPRAS_DB_URL:-jdbc:postgresql://postgres:5432/compras_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
    networks:
      - ms-network
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  contratos-service:
    build: ./contratos-service
    container_name: contratos-service
    ports:
      - "${CONTRATOS_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      EUREKA_URL: ${EUREKA_URL:-http://eureka-server:8761/eureka/}
      JAEGER_URL: ${JAEGER_URL:-http://jaeger:4318/v1/traces}
      DB_URL: ${CONTRATOS_DB_URL:-jdbc:postgresql://postgres:5432/contratos_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
    networks:
      - ms-network
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  vendas-service:
    build: ./vendas-service
    container_name: vendas-service
    ports:
      - "${VENDAS_PORT:-8083}:8083"
    environment:
      EUREKA_URL: ${EUREKA_URL:-http://eureka-server:8761/eureka/}
      JAEGER_URL: ${JAEGER_URL:-http://jaeger:4318/v1/traces}
      DB_URL: ${VENDAS_DB_URL:-jdbc:postgresql://postgres:5432/vendas_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
    networks:
      - ms-network
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

networks:
  ms-network:
    driver: bridge

volumes:
  postgres_data:
