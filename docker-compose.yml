version: '3.8'

services:

  # ── Bancos de Dados ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - ms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Infraestrutura ───────────────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    networks:
      - ms-network

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      EUREKA_HOSTNAME: eureka-server
    networks:
      - ms-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
    networks:
      - ms-network
    depends_on:
      eureka-server:
        condition: service_healthy

  # ── Microsserviços de Negócio ────────────────────────────────────────────────

  compras-service:
    build: ./compras-service
    container_name: compras-service
    ports:
      - "8081:8081"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      JAEGER_URL: http://jaeger:4318/v1/traces
      DB_URL: jdbc:postgresql://postgres:5432/compras_db
      DB_USER: postgres
      DB_PASS: postgres
    networks:
      - ms-network
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  contratos-service:
    build: ./contratos-service
    container_name: contratos-service
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      JAEGER_URL: http://jaeger:4318/v1/traces
      DB_URL: jdbc:postgresql://postgres:5432/contratos_db
      DB_USER: postgres
      DB_PASS: postgres
    networks:
      - ms-network
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  vendas-service:
    build: ./vendas-service
    container_name: vendas-service
    ports:
      - "8083:8083"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      JAEGER_URL: http://jaeger:4318/v1/traces
      CONTRATOS_SERVICE_URL: http://contratos-service:8082
      DB_URL: jdbc:postgresql://postgres:5432/vendas_db
      DB_USER: postgres
      DB_PASS: postgres
    networks:
      - ms-network
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

networks:
  ms-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
