server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: compras-service
          uri: lb://compras-service
          predicates:
            - Path=/api/compras/**
        - id: compras-openapi
          uri: lb://compras-service
          predicates:
            - Path=/v3/api-docs/compras
          filters:
            - SetPath=/v3/api-docs
        - id: contratos-service
          uri: lb://contratos-service
          predicates:
            - Path=/api/contratos/**
        - id: contratos-openapi
          uri: lb://contratos-service
          predicates:
            - Path=/v3/api-docs/contratos
          filters:
            - SetPath=/v3/api-docs
        - id: vendas-service
          uri: lb://vendas-service
          predicates:
            - Path=/api/vendas/**
        - id: vendas-openapi
          uri: lb://vendas-service
          predicates:
            - Path=/v3/api-docs/vendas
          filters:
            - SetPath=/v3/api-docs

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    preferIpAddress: true

logging:
  include-application-name: false
  pattern:
    correlation: "[${spring.application.name:api-gateway},%X{correlationId:-},%X{traceId:-},%X{spanId:-}] "

management:
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${JAEGER_URL:http://localhost:4318/v1/traces}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: api-gateway
        url: /v3/api-docs
      - name: compras-service
        url: /v3/api-docs/compras
      - name: contratos-service
        url: /v3/api-docs/contratos
      - name: vendas-service
        url: /v3/api-docs/vendas
