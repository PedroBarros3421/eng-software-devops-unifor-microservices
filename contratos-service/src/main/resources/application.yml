server:
  port: 8082

spring:
  application:
    name: contratos-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/contratos_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    preferIpAddress: true

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: "health,info"
  tracing:
    sampling:
      probability: 1.0  # Send 100% of traces (adjust for production)
  otlp:
    tracing:
      endpoint: ${JAEGER_URL:http://localhost:4318/v1/traces} # Jaeger OTLP HTTP receiver